const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── EXERCISE DATABASE ──────────────────────────────────────
const EX_DB={chest:[{name:"Bench Press",eq:"barbell",step:2.5,w:"60 kg",r:"6–8"},{name:"DB Bench Press",eq:"dumbbells",step:2,w:"24 kg",r:"8–10"},{name:"Machine Chest Press",eq:"machine",step:5,w:"50 kg",r:"8–10"},{name:"Incline DB Press",eq:"dumbbells",w:"22 kg",r:"10–12"},{name:"Incline Barbell Press",eq:"barbell",w:"50 kg",r:"8–10"},{name:"Cable Fly (each side)",eq:"cable",w:"15 kg",r:"12–15"},{name:"Pec Deck",eq:"machine",w:"45 kg",r:"12–15"},{name:"Weighted Dip",eq:"bodyweight",w:"BW",r:"8–12"}],back:[{name:"Barbell Row",eq:"barbell",step:2.5,w:"70 kg",r:"6–8"},{name:"Chest-Supported Row",eq:"machine",step:2.5,w:"60 kg",r:"8–10"},{name:"Lat Pulldown",eq:"cable",w:"55 kg",r:"8–12"},{name:"Weighted Pull-Up",eq:"bodyweight",step:2.5,w:"BW",r:"6–10"},{name:"Seated Cable Row",eq:"cable",w:"50 kg",r:"10–12"},{name:"T-Bar Row",eq:"barbell",w:"50 kg",r:"8–10"},{name:"Straight-Arm Pulldown",eq:"cable",w:"25 kg",r:"12–15"},{name:"Face Pull",eq:"cable",w:"20 kg",r:"15–20"},{name:"Conventional Deadlift",eq:"barbell",step:5,w:"100 kg",r:"5–6"}],shoulders:[{name:"Barbell OHP",eq:"barbell",step:2.5,w:"35 kg",r:"6–8"},{name:"DB Shoulder Press",eq:"dumbbells",w:"18 kg",r:"8–10"},{name:"Machine Shoulder Press",eq:"machine",w:"40 kg",r:"8–10"},{name:"Cable Lateral Raise (each)",eq:"cable",w:"8 kg",r:"12–15"},{name:"DB Lateral Raise",eq:"dumbbells",w:"10 kg",r:"12–15"},{name:"Rear Delt Fly (each)",eq:"dumbbells",w:"8 kg",r:"15–20"},{name:"Reverse Pec Deck",eq:"machine",w:"30 kg",r:"15–20"}],quads:[{name:"Barbell Squat",eq:"barbell",step:2.5,w:"80 kg",r:"6–8"},{name:"Front Squat",eq:"barbell",step:2.5,w:"60 kg",r:"6–8"},{name:"Leg Press",eq:"machine",step:5,w:"120 kg",r:"8–12"},{name:"Hack Squat",eq:"machine",step:5,w:"80 kg",r:"8–10"},{name:"Bulgarian Split Squat (each)",eq:"dumbbells",w:"16 kg",r:"8–12"},{name:"Leg Extension",eq:"machine",w:"40 kg",r:"12–15"}],hamstrings:[{name:"Romanian Deadlift",eq:"barbell",step:5,w:"80 kg",r:"8–10"},{name:"Stiff-Leg Deadlift",eq:"barbell",step:5,w:"70 kg",r:"8–10"},{name:"Lying Leg Curl",eq:"machine",w:"30 kg",r:"10–12"},{name:"Seated Leg Curl",eq:"machine",w:"35 kg",r:"10–12"},{name:"Nordic Curl",eq:"bodyweight",w:"BW",r:"6–10"}],glutes:[{name:"Hip Thrust",eq:"barbell",step:5,w:"80 kg",r:"8–12"},{name:"Cable Pull-Through",eq:"cable",w:"40 kg",r:"12–15"},{name:"Glute Bridge",eq:"barbell",w:"60 kg",r:"10–12"},{name:"45° Back Extension",eq:"bodyweight",w:"BW",r:"10–15"}],biceps:[{name:"Barbell Curl",eq:"barbell",w:"30 kg",r:"8–12"},{name:"EZ-Bar Curl",eq:"barbell",w:"25 kg",r:"8–12"},{name:"DB Curl",eq:"dumbbells",w:"14 kg",r:"10–12"},{name:"Hammer Curl",eq:"dumbbells",w:"12 kg",r:"10–12"},{name:"Incline DB Curl",eq:"dumbbells",w:"10 kg",r:"10–15"},{name:"Cable Curl",eq:"cable",w:"20 kg",r:"12–15"}],triceps:[{name:"Cable Triceps Pushdown",eq:"cable",w:"30 kg",r:"10–12"},{name:"EZ Bar Skull Crushers",eq:"barbell",w:"25 kg",r:"10–12"},{name:"Overhead Triceps Ext.",eq:"cable",w:"25 kg",r:"10–12"},{name:"Close-Grip Bench Press",eq:"barbell",w:"50 kg",r:"8–10"},{name:"Triceps Kickback",eq:"dumbbells",w:"8 kg",r:"12–15"}],calves:[{name:"Standing Calf Raise",eq:"machine",w:"80 kg",r:"12–15"},{name:"Seated Calf Raise",eq:"machine",w:"40 kg",r:"15–20"},{name:"Leg Press Calf Raise",eq:"machine",w:"100 kg",r:"12–15"}],abs:[{name:"Cable Crunch",eq:"cable",w:"40 kg",r:"12–15"},{name:"Ab Wheel Rollout",eq:"bodyweight",w:"BW",r:"8–12"},{name:"Hanging Leg Raise",eq:"bodyweight",w:"BW",r:"10–15"},{name:"Cable Rope Crunch",eq:"cable",w:"35 kg",r:"12–20"}]};

function findMG(name){for(const[mg,list]of Object.entries(EX_DB))if(list.some(e=>e.name===name))return mg;return null;}
function findAlts(name,q=""){const mg=findMG(name);if(!mg)return[];const ql=q.toLowerCase().trim();return EX_DB[mg].filter(e=>e.name!==name&&(!ql||e.name.toLowerCase().includes(ql)||e.eq.toLowerCase().includes(ql)));}

// ─── PPL PLAN ───────────────────────────────────────────────
function buildPPL(){
  const s=(reps,weight,rpes)=>rpes.map(r=>({reps,weight,targetRPE:r}));
  const w1={days:[
    {label:"Day 1",subtitle:"Push A – Chest",exercises:[
      {name:"Bench Press",muscleGroup:"chest",isMain:true,equipment:"barbell",progressionStep:2.5,sets:s("7","100 kg",[7,7,7.5,8])},
      {name:"Incline DB Press",muscleGroup:"chest",sets:s("10–12","35 kg",[7,7.5,8,8.5])},
      {name:"Weighted Dip",muscleGroup:"chest",sets:[...s("8–12","BW + 10 kg",[7,7.5]),...s("10–15","BW + 10 kg",[8,8.5])]},
      {name:"Cable Fly (each side)",muscleGroup:"chest",sets:s("15–20","15 kg",[8,8.5,9])},
      {name:"Cable Triceps Pushdown",muscleGroup:"triceps",sets:s("12–15","30 kg",[8,8.5,9])},
      {name:"EZ Bar Skull Crushers",muscleGroup:"triceps",sets:s("10–12","30 kg",[8,8.5,9])},
      {name:"Cable Lateral Raise (each)",muscleGroup:"shoulders",sets:s("15–20","10 kg",[8,8.5,9])},
      {name:"Cable Rope Crunch",muscleGroup:"abs",sets:s("12–20","40 kg",[8,8.5,9])},
    ]},
    {label:"Day 2",subtitle:"Pull A – Back + DL",exercises:[
      {name:"Conventional Deadlift",muscleGroup:"back",isMain:true,equipment:"barbell",progressionStep:5,sets:s("5","150 kg",[7,7,7.5])},
      {name:"Chest-Supported Row",muscleGroup:"back",isMain:true,equipment:"machine",progressionStep:2.5,sets:[{reps:"7",weight:"82.5 kg",targetRPE:7},{reps:"7",weight:"80 kg",targetRPE:7},{reps:"7",weight:"80 kg",targetRPE:7.5},{reps:"7",weight:"80 kg",targetRPE:8}]},
      {name:"Lat Pulldown",muscleGroup:"back",sets:s("10–12","80 kg",[7,7.5,8,8.5])},
      {name:"Seated Cable Row",muscleGroup:"back",sets:s("10–12","75 kg",[7,7.5,8,8.5])},
      {name:"EZ-Bar Curl",muscleGroup:"biceps",sets:s("10–12","25 kg",[8,8.5,9])},
      {name:"Hammer Curl",muscleGroup:"biceps",sets:s("12–15","14 kg",[8,8.5,9])},
    ]},
    {label:"Day 3",subtitle:"Legs A – Quad Focus",exercises:[
      {name:"Front Squat",muscleGroup:"quads",isMain:true,equipment:"barbell",progressionStep:2.5,sets:[{reps:"5",weight:"82.5 kg",targetRPE:7},{reps:"5",weight:"80 kg",targetRPE:7},{reps:"5",weight:"80 kg",targetRPE:7.5},{reps:"5",weight:"80 kg",targetRPE:8}]},
      {name:"Romanian Deadlift",muscleGroup:"hamstrings",isMain:true,equipment:"barbell",progressionStep:5,sets:s("10–12","100 kg",[7,7.5,8,8.5])},
      {name:"Leg Press",muscleGroup:"quads",sets:s("10–12","160 kg",[7,7.5,8,8.5])},
      {name:"Leg Extension",muscleGroup:"quads",sets:s("15–20","40 kg",[8,8.5,9])},
      {name:"Lying Leg Curl",muscleGroup:"hamstrings",sets:s("12–15","30 kg",[8,8.5,9])},
      {name:"Standing Calf Raise",muscleGroup:"calves",sets:s("15–20","100 kg",[8,8.5,9,9,9,9])},
    ]},
    {label:"Day 4",subtitle:"Push B – Shoulder Focus",exercises:[
      {name:"Barbell OHP",muscleGroup:"shoulders",isMain:true,equipment:"barbell",progressionStep:2.5,sets:[{reps:"7",weight:"42.5 kg",targetRPE:7},{reps:"7",weight:"40 kg",targetRPE:7},{reps:"7",weight:"40 kg",targetRPE:7.5},{reps:"7",weight:"40 kg",targetRPE:8}]},
      {name:"DB Shoulder Press",muscleGroup:"shoulders",sets:s("10–12","22 kg",[7,7.5,8,8.5])},
      {name:"Incline DB Press",muscleGroup:"chest",sets:s("10–12","32.5 kg",[7,7.5,8,8.5])},
      {name:"Cable Lateral Raise (each)",muscleGroup:"shoulders",sets:s("15–20","10 kg",[8,8.5,9])},
      {name:"Face Pull",muscleGroup:"shoulders",sets:s("15–20","25 kg",[8,8.5,9])},
      {name:"Weighted Dip",muscleGroup:"triceps",sets:s("8–12","BW + 12.5 kg",[8,8.5,9])},
      {name:"EZ Bar Skull Crushers",muscleGroup:"triceps",sets:s("10–12","30 kg",[8,8.5,9])},
    ]},
    {label:"Day 5",subtitle:"Pull B – Width + Arms",exercises:[
      {name:"Weighted Pull-Up",muscleGroup:"back",isMain:true,equipment:"bodyweight",progressionStep:2.5,sets:s("6","BW + 10 kg",[7,7,7.5,8])},
      {name:"Seated Cable Row",muscleGroup:"back",sets:s("10–12","45 kg",[7,7.5,8,8.5])},
      {name:"Chest-Supported Row",muscleGroup:"back",sets:s("10–12","70 kg",[7,7.5,8,8.5])},
      {name:"Rear Delt Fly (each)",muscleGroup:"shoulders",sets:s("15–20","12 kg",[8,8.5,9])},
      {name:"Incline DB Curl",muscleGroup:"biceps",sets:s("10–15","14 kg",[8,8.5,9])},
      {name:"Cable Curl",muscleGroup:"biceps",sets:s("12–15","27.5 kg",[8,8.5,9])},
      {name:"Face Pull",muscleGroup:"shoulders",sets:s("15–20","25 kg",[8,8.5,9])},
      {name:"Ab Wheel Rollout",muscleGroup:"abs",sets:s("8–15","BW",[8,8.5,9])},
    ]},
    {label:"Day 6",subtitle:"Legs B – Posterior Chain",exercises:[
      {name:"Romanian Deadlift",muscleGroup:"hamstrings",isMain:true,equipment:"barbell",progressionStep:5,sets:[{reps:"7",weight:"105 kg",targetRPE:7},{reps:"7",weight:"100 kg",targetRPE:7},{reps:"7",weight:"100 kg",targetRPE:7.5},{reps:"7",weight:"100 kg",targetRPE:8}]},
      {name:"Hack Squat",muscleGroup:"quads",sets:s("8–12","100 kg",[7,7.5,8,8.5])},
      {name:"45° Back Extension",muscleGroup:"glutes",sets:s("10–15","BW + 10 kg",[7,7.5,8,8.5])},
      {name:"Bulgarian Split Squat (each)",muscleGroup:"quads",sets:s("10–12","24 kg",[8,8.5,9])},
      {name:"Seated Leg Curl",muscleGroup:"hamstrings",sets:s("10–15","30 kg",[8,8.5,9])},
      {name:"Seated Calf Raise",muscleGroup:"calves",sets:s("15–20","60 kg",[8,8.5,9,9,9,9])},
    ]},
  ]};
  const ph=[{label:"Submaximal I",phase:"intro"},{label:"Submaximal II",phase:"intro"},{label:"Accumulation I",phase:"build"},{label:"Accumulation II",phase:"build"},{label:"Peak I",phase:"peak"},{label:"Peak II",phase:"peak"},{label:"Deload",phase:"deload"}];
  // RPE offset per week (added to base RPE of each set)
  const rpeOff=[0, 0.5, 0.5, 1.0, 1.0, 1.5, -2.0];
  // Extra sets for main lifts per week (accumulation/peak add sets)
  const extraMain=[0, 0, 1, 1, 2, 2, 0];
  // Extra sets for accessories per week
  const extraAcc=[0, 0, 0, 1, 1, 1, 0];
  // Weight bump per week for main lifts (kg added to week 1 top set)
  const mainBumps={"Bench Press":[0,2.5,5,5,7.5,10,0],"Conventional Deadlift":[0,5,10,10,15,20,0],"Chest-Supported Row":[0,2.5,5,5,7.5,10,0],"Front Squat":[0,2.5,5,5,7.5,10,0],"Barbell OHP":[0,2.5,2.5,5,5,7.5,0],"Weighted Pull-Up":[0,2.5,5,5,7.5,10,0],"Romanian Deadlift":[0,5,5,10,10,15,0]};
  
  function addKg(wStr,delta){if(!delta)return wStr;const bwp=wStr.match(/^BW\s*\+\s*([\d.]+)\s*kg$/i);if(bwp)return `BW + ${+(parseFloat(bwp[1])+delta).toFixed(1)} kg`;const kg=wStr.match(/^([\d.]+)\s*kg$/i);if(kg)return `${+(parseFloat(kg[1])+delta).toFixed(1)} kg`;return wStr;}
  
  const weeks=[{...w1,phase:ph[0]}];
  for(let w=1;w<7;w++){
    const wd=JSON.parse(JSON.stringify(w1));
    wd.phase=ph[w];
    wd.days.forEach(day=>{
      day.exercises.forEach(ex=>{
        const isMain=ex.isMain;
        const bump=isMain&&mainBumps[ex.name]?mainBumps[ex.name][w]:0;
        // Apply weight progression
        if(bump)ex.sets.forEach(set=>{set.weight=addKg(set.weight,bump);});
        // Apply RPE progression (clamped 5–10)
        ex.sets.forEach(set=>{set.targetRPE=Math.min(10,Math.max(5,Math.round((set.targetRPE+rpeOff[w])*2)/2));});
        // Add extra sets for accumulation/peak
        const extra=isMain?extraMain[w]:extraAcc[w];
        if(extra>0&&ex.sets.length>=2){const last=ex.sets[ex.sets.length-1];for(let i=0;i<extra;i++)ex.sets.push({...JSON.parse(JSON.stringify(last)),targetRPE:Math.min(10,last.targetRPE+0.5)});}
        // Deload: cut sets, drop RPE
        if(w===6){ex.sets=ex.sets.slice(0,isMain?2:1);ex.sets.forEach(set=>{set.targetRPE=6;});}
      });
    });
    weeks.push(wd);
  }
  return{id:"ppl-6day",name:"PPL 6-Day",subtitle:"Push/Pull/Legs Hypertrophy",weeks,daysPerWeek:6,type:"ppl"};
}

const I=({n,s:sz=20,c="currentColor"})=>{const d={check:<path d="M20 6L9 17l-5-5" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>,chevR:<path d="M9 18l6-6-6-6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,chevL:<path d="M15 18l-6-6 6-6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,clock:<><circle cx="12" cy="12" r="10" strokeWidth="1.5"/><path d="M12 6v6l4 2" strokeWidth="2" strokeLinecap="round"/></>,dumb:<path d="M6.5 6.5h11M4 8.5h2.5v7H4a1 1 0 01-1-1v-5a1 1 0 011-1zm14 0h2a1 1 0 011 1v5a1 1 0 01-1 1h-2v-7z" strokeWidth="1.5" strokeLinecap="round"/>,cal:<><rect x="3" y="4" width="18" height="18" rx="2" strokeWidth="1.5"/><path d="M16 2v4M8 2v4M3 10h18" strokeWidth="1.5"/></>,chart:<path d="M18 20V10M12 20V4M6 20v-6" strokeWidth="2" strokeLinecap="round"/>,plus:<path d="M12 5v14M5 12h14" strokeWidth="2" strokeLinecap="round"/>,x:<path d="M18 6L6 18M6 6l12 12" strokeWidth="2" strokeLinecap="round"/>,swap:<><path d="M16 3l4 4-4 4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M20 7H4" strokeWidth="2" strokeLinecap="round"/><path d="M8 21l-4-4 4-4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M4 17h16" strokeWidth="2" strokeLinecap="round"/></>,search:<><circle cx="11" cy="11" r="7" strokeWidth="1.5"/><path d="M21 21l-4.35-4.35" strokeWidth="2" strokeLinecap="round"/></>,play:<polygon points="5,3 19,12 5,21" strokeWidth="1.5" strokeLinejoin="round"/>,pause:<><rect x="6" y="4" width="4" height="16" strokeWidth="1.5" rx="1"/><rect x="14" y="4" width="4" height="16" strokeWidth="1.5" rx="1"/></>,trash:<><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2" strokeWidth="1.5" strokeLinecap="round"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" strokeWidth="1.5"/></>};return<svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} style={{flexShrink:0}}>{d[n]||null}</svg>;};

// ─── REST TIMER with Notification ───────────────────────────
function RestTimer({sec:def=120,onDone}){const endTime=useRef(Date.now()+def*1000);const[remaining,setRemaining]=useState(def);const[paused,setPaused]=useState(false);const pausedAt=useRef(null);const notified=useRef(false);useEffect(()=>{if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();},[]);useEffect(()=>{if(paused)return;const tick=()=>{const left=Math.max(0,Math.ceil((endTime.current-Date.now())/1000));setRemaining(left);if(left<=0&&!notified.current){notified.current=true;try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=880;g.gain.value=0.3;o.start();o.stop(ac.currentTime+0.15);setTimeout(()=>{const o2=ac.createOscillator();const g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);o2.frequency.value=1100;g2.gain.value=0.3;o2.start();o2.stop(ac.currentTime+0.2);},200);}catch{}if("Notification"in window&&Notification.permission==="granted")try{new Notification("FORGE",{body:"Rest done — time to lift!"});}catch{}if(navigator.vibrate)navigator.vibrate([200,100,200]);}};tick();const id=setInterval(tick,250);return()=>clearInterval(id);},[paused]);const togglePause=()=>{if(paused){endTime.current=Date.now()+pausedAt.current*1000;setPaused(false);}else{pausedAt.current=remaining;setPaused(true);}};const s=remaining;const pct=((def-s)/def)*100;return(<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"rgba(15,15,25,0.92)",backdropFilter:"blur(24px) saturate(180%)",borderRadius:24,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.06)",zIndex:100,minWidth:260,color:"#fff",animation:"slideUp .3s cubic-bezier(.16,1,.3,1)"}}><div style={{position:"relative",width:44,height:44}}><svg width={44} height={44} style={{transform:"rotat // ─── EMPTY PLAN BUILDER (weights TBD) ───────────────────────
function buildEmptyPlan(name,days,gender){
  const pick=(mg,idx)=>{const list=EX_DB[mg];return list?list[idx%list.length]:null;};
  // Full-body template: compound per major group + isolation accessories
  const compoundOrder=gender==="female"
    ?["quads","glutes","hamstrings","back","chest","shoulders"]
    :["chest","back","quads","hamstrings","shoulders"];
  const isoOrder=gender==="female"
    ?["glutes","hamstrings","calves","biceps","triceps","abs"]
    :["triceps","biceps","calves","abs"];
  
  function makeDay(dayIdx){
    const exercises=[];
    compoundOrder.forEach((mg,i)=>{
      const ex=pick(mg,(dayIdx+i)%EX_DB[mg].length);
      if(!ex)return;
      const nSets=3;
      exercises.push({name:ex.name,muscleGroup:mg,isMain:!!ex.step,equipment:ex.eq,progressionStep:ex.step||0,
        sets:Array.from({length:nSets},(_,si)=>({reps:ex.r,weight:"",targetRPE:7+si*0.5}))});
    });
    isoOrder.forEach((mg,i)=>{
      const list=EX_DB[mg];if(!list)return;
      const ex=list[(dayIdx+i+2)%list.length];
      exercises.push({name:ex.name,muscleGroup:mg,isMain:false,equipment:ex.eq,progressionStep:0,
        sets:Array.from({length:2},(_,si)=>({reps:ex.r,weight:"",targetRPE:8+si*0.5}))});
    });
    return{label:`Day ${dayIdx+1}`,subtitle:"Full Body",exercises};
  }
  
  const ph=[
    {label:"Intro",phase:"intro"},{label:"Build I",phase:"build"},{label:"Build II",phase:"build"},
    {label:"Peak",phase:"peak"},{label:"Overreach",phase:"overreach"},{label:"Deload",phase:"deload"}];
  const rpeOff=[0,0.5,1.0,1.0,1.5,-2.0];
  const extraMain=[0,0,1,1,2,0];
  
  const week1Days=[];
  for(let d=0;d<days;d++)week1Days.push(makeDay(d));
  
  const weeks=[];
  for(let w=0;w<6;w++){
    const wd=JSON.parse(JSON.stringify(week1Days));
    wd.forEach(day=>day.exercises.forEach(ex=>{
      // RPE progression
      ex.sets.forEach(set=>{set.targetRPE=Math.min(10,Math.max(5,Math.round((set.targetRPE+rpeOff[w])*2)/2));});
      // Extra sets for build/peak
      const extra=ex.isMain?extraMain[w]:0;
      if(extra>0&&ex.sets.length>=2){const last=ex.sets[ex.sets.length-1];for(let i=0;i<extra;i++)ex.sets.push({...JSON.parse(JSON.stringify(last)),targetRPE:Math.min(10,last.targetRPE+0.5)});}
      // Deload
      if(w===5){ex.sets=ex.sets.slice(0,ex.isMain?2:1);ex.sets.forEach(set=>{set.targetRPE=6;});}
    }));
    weeks.push({days:wd,phase:ph[w]});
  }
  return{id:"plan-"+Date.now(),name,subtitle:gender==="female"?"Lower Body Focus":"Upper Body Focus",weeks,daysPerWeek:days,gender,type:"fullbody"};
}

const hWeight=useCallback((w,d,e,s,newW)=>{setPlans(prev=>prev.map(p=>{if(p.id!==pid)return p;const n=JSON.parse(JSON.stringify(p));
// Update all sets from s onward in this exercise this week
