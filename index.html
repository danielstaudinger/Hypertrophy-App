// ─── EXERCISE DATABASE ──────────────────────────────────────

function findMG(name){for(const[mg,list]of Object.entries(EX_DB))if(list.some(e=>e.name===name))return mg;return null;}
function findAlts(name,q=""){const mg=findMG(name);if(!mg)return[];const ql=q.toLowerCase().trim();return EX_DB[mg].filter(e=>e.name!==name&&(!ql||e.name.toLowerCase().includes(ql)||e.eq.toLowerCase().includes(ql)));}

// ─── PPL PLAN ───────────────────────────────────────────────
function buildPPL(){

    ]},

// ─── ICONS ──────────────────────────────────────────────────
const I=({n,s:sz=20,c="currentColor"})=>{const d={check:<path d="M20 6L9 17l-5-5" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>,chevR:<path d="M9 18l6-6-6-6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,chevL:<path d="M15 18l-6-6 6-6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,clock:<><circle cx="12" cy="12" r="10" strokeWidth="1.5"/><path d="M12 6v6l4 2" strokeWidth="2" strokeLinecap="round"/></>,dumb:<path d="M6.5 6.5h11M4 8.5h2.5v7H4a1 1 0 01-1-1v-5a1 1 0 011-1zm14 0h2a1 1 0 011 1v5a1 1 0 01-1 1h-2v-7z" strokeWidth="1.5" strokeLinecap="round"/>,cal:<><rect x="3" y="4" width="18" height="18" rx="2" strokeWidth="1.5"/><path d="M16 2v4M8 2v4M3 10h18" strokeWidth="1.5"/></>,chart:<path d="M18 20V10M12 20V4M6 20v-6" strokeWidth="2" strokeLinecap="round"/>,plus:<path d="M12 5v14M5 12h14" strokeWidth="2" strokeLinecap="round"/>,x:<path d="M18 6L6 18M6 6l12 12" strokeWidth="2" strokeLinecap="round"/>,swap:<><path d="M16 3l4 4-4 4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M20 7H4" strokeWidth="2" strokeLinecap="round"/><path d="M8 21l-4-4 4-4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M4 17h16" strokeWidth="2" strokeLinecap="round"/></>,search:<><circle cx="11" cy="11" r="7" strokeWidth="1.5"/><path d="M21 21l-4.35-4.35" strokeWidth="2" strokeLinecap="round"/></>,play:<polygon points="5,3 19,12 5,21" strokeWidth="1.5" strokeLinejoin="round"/>,pause:<><rect x="6" y="4" width="4" height="16" strokeWidth="1.5" rx="1"/><rect x="14" y="4" width="4" height="16" strokeWidth="1.5" rx="1"/></>};return<svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={c} style={{flexShrink:0}}>{d[n]||null}</svg>;};

// ─── REST TIMER with Notification ───────────────────────────
function RestTimer({sec:def=120,onDone}){const[s,setS]=useState(def);const[run,setRun]=useState(true);const ref=useRef(null);const notified=useRef(false);useEffect(()=>{if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();},[]);useEffect(()=>{if(run&&s>0)ref.current=setInterval(()=>setS(p=>p-1),1000);return()=>clearInterval(ref.current);},[run,s]);useEffect(()=>{if(s<=0&&!notified.current){notified.current=true;if("Notification"in window&&Notification.permission==="granted")try{new Notification("FORGE",{body:"Rest done — time to lift!",icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>"});}catch{}if(navigator.vibrate)navigator.vibrate([200,100,200]);}},[s]);const pct=((def-s)/def)*100;return(<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"rgba(15,15,25,0.92)",backdropFilter:"blur(24px) saturate(180%)",borderRadius:24,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.06)",zIndex:100,minWidth:260,color:"#fff",animation:"slideUp .3s cubic-bezier(.16,1,.3,1)"}}><div style={{position:"relative",width:44,height:44}}><svg width={44} height={44} style={{transform:"rotate(-90deg)"}}><circle cx={22} cy={22} r={18} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={3}/><circle cx={22} cy={22} r={18} fill="none" stroke={s<=10?"#FF6B6B":"#A78BFA"} strokeWidth={3} strokeDasharray={113} strokeDashoffset={113-(pct/100)*113} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear"}}/></svg><span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,fontVariantNumeric:"tabular-nums",color:s<=0?"#A78BFA":"#fff"}}>{Math.floor(s/60)}:{(s%60).toString().padStart(2,"0")}</span></div><div style={{flex:1}}><div style={{fontSize:10,opacity:0.4,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>REST</div><div style={{fontSize:14,opacity:0.8,fontWeight:600}}>{s<=0?"Time to lift!":"Recovering..."}</div></div><button onClick={()=>setRun(!run)} style={{width:36,height:36,borderRadius:12,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}><I n={run?"pause":"play"} s={16} c="#fff"/></button><button onClick={onDone} style={{width:36,height:36,borderRadius:12,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.03)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"rgba(255,255,255,0.4)"}}><I n="x" s={16} c="rgba(255,255,255,0.4)"/></button></div>);}

// ─── SET ROW ────────────────────────────────────────────────
function SetRow({set,si,ei,di,wi,logged,onLog}){const done=logged?.repsHit!=null;const target=parseInt((set.reps.match(/\d+/)||["0"])[0],10);const[sel,setSel]=useState(done?logged.repsHit:target);useEffect(()=>{done?setSel(logged.repsHit):setSel(target);},[done,logged?.repsHit,target]);const mod=sel!==target;return(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto auto",alignItems:"center",gap:8,padding:"10px 0",borderTop:si>0?"1px solid rgba(255,255,255,0.04)":"none",opacity:done?0.5:1,transition:"all .25s cubic-bezier(.16,1,.3,1)"}}><span style={{fontSize:14,fontWeight:700,color:"var(--t1)",fontVariantNumeric:"tabular-nums"}}>{set.weight}</span><span style={{fontSize:12,color:"var(--t2)",fontVariantNumeric:"tabular-nums"}}>{set.reps} × {set.targetRPE}</span><select value={sel} onChange={e=>setSel(+e.target.value)} disabled={done} style={{width:52,height:36,borderRadius:10,fontSize:14,fontWeight:800,textAlign:"center",border:done?"2px solid var(--ac)":mod?"2px solid rgba(167,139,250,0.4)":"1.5px dashed rgba(255,255,255,0.1)",background:done?"rgba(167,139,250,0.15)":mod?"rgba(167,139,250,0.06)":"rgba(255,255,255,0.03)",color:done||mod?"var(--ac)":"var(--t3)",cursor:done?"default":"pointer",appearance:"none",WebkitAppearance:"none",fontVariantNumeric:"tabular-nums",opacity:done?1:mod?1:0.5,transition:"all .2s ease"}}>{Array.from({length:31},(_,i)=><option key={i} value={i}>{i}</option>)}</select><button onClick={()=>done?onLog(wi,di,ei,si,null):onLog(wi,di,ei,si,sel)} style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:done?"var(--ac)":"transparent",border:done?"none":"1.5px dashed rgba(255,255,255,0.1)",color:done?"#fff":"var(--t3)",cursor:"pointer",padding:0,WebkitTapHighlightColor:"transparent",transition:"all .2s cubic-bezier(.16,1,.3,1)",...(done?{boxShadow:"0 2px 12px rgba(167,139,250,0.3)"}:{})}}><I n="check" s={16} c={done?"#fff":"var(--t3)"}/></button></div>);}

// ─── EXERCISE BLOCK ─────────────────────────────────────────
function ExBlock({ex,ei,di,wi,log,onLog,onRest,onSwap}){const[showSwap,setShowSwap]=useState(false);const[q,setQ]=useState("");const alts=useMemo(()=>findAlts(ex.name,q),[ex.name,q]);const done=ex.sets.filter((_,i)=>log[`${wi}-${di}-${ei}-${i}`]?.repsHit!=null).length;const all=done===ex.sets.length;return(<div style={{background:"rgba(255,255,255,0.03)",borderRadius:18,border:"1px solid rgba(255,255,255,0.06)",padding:"14px 16px",marginBottom:10,transition:"all .3s cubic-bezier(.16,1,.3,1)",...(all?{borderColor:"rgba(167,139,250,0.2)",boxShadow:"inset 0 0 0 1px rgba(167,139,250,0.08)"}:{}),backdropFilter:"blur(8px)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:14,fontWeight:800,color:"var(--t1)",letterSpacing:"-0.01em"}}>{ex.name}</span>{ex.isMain&&<span style={{fontSize:9,fontWeight:800,letterSpacing:"0.1em",background:"rgba(167,139,250,0.15)",color:"var(--ac)",padding:"2px 8px",borderRadius:6}}>MAIN</span>}</div>{ex.muscleGroup&&<div style={{fontSize:11,color:"var(--t3)",marginTop:2,textTransform:"capitalize"}}>{ex.muscleGroup}{ex.equipment?` · ${ex.equipment}`:""}</div>}</div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,fontWeight:700,fontVariantNumeric:"tabular-nums",color:all?"var(--ac)":"var(--t3)"}}>{done}/{ex.sets.length}</span><button onClick={()=>{setShowSwap(!showSwap);setQ("");}} style={{width:28,height:28,borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:showSwap?"rgba(167,139,250,0.1)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><I n="swap" s={14} c={showSwap?"var(--ac)":"var(--t3)"}/></button></div></div>{showSwap&&(<div style={{background:"rgba(0,0,0,0.2)",borderRadius:14,padding:12,marginBottom:10,border:"1px solid rgba(255,255,255,0.05)"}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"8px 12px",border:"1px solid rgba(255,255,255,0.06)"}}><I n="search" s={16} c="var(--t3)"/><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search exercises..." style={{flex:1,background:"transparent",border:"none",outline:"none",color:"var(--t1)",fontSize:13,fontWeight:500,fontFamily:"inherit"}}/>{q&&<button onClick={()=>setQ("")} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><I n="x" s={14} c="var(--t3)"/></button>}</div><div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>{alts.length===0&&<div style={{fontSize:12,color:"var(--t3)",textAlign:"center",padding:12}}>No matches</div>}{alts.map(a=>(<button key={a.name} onClick={()=>{onSwap(wi,di,ei,a);setShowSwap(false);}} style={{padding:"10px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.03)",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",color:"var(--t1)"}}><div><div style={{fontSize:13,fontWeight:600}}>{a.name}</div><div style={{fontSize:11,color:"var(--t3)"}}>{a.eq} · {a.r}</div></div><I n="chevR" s={14} c="var(--t3)"/></button>))}</div></div>)}{ex.sets.map((set,i)=>{const key=`${wi}-${di}-${ei}-${i}`;return<SetRow key={i} set={set} si={i} ei={ei} di={di} wi={wi} logged={log[key]} onLog={(w,d,e,s,v)=>{onLog(w,d,e,s,v);if(v!=null&&i<ex.sets.length-1)onRest();}}/>;})}</div>);}

// ─── MAIN APP ───────────────────────────────────────────────
function ForgeApp(){const[plans,setPlans]=useState(null);const[pid,setPid]=useState(null);const[wi,setWi]=useState(0);const[di,setDi]=useState(0);const[tab,setTab]=useState("workout");const[log,setLog]=useState({});const[timer,setTimer]=useState(false);const[tsec,setTsec]=useState(120);const[loaded,setLoaded]=useState(false);const[showWiz,setShowWiz]=useState(false);
useEffect(()=>{(async()=>{try{const d=await window.storage.get("forge-v3");if(d?.value){const p=JSON.parse(d.value);if(p.plans?.length){setPlans(p.plans);setPid(p.pid);setLog(p.log||{});setWi(p.wi||0);setDi(p.di||0);setLoaded(true);return;}}}catch{}const ppl=buildPPL();setPlans([ppl]);setPid(ppl.id);setLoaded(true);})();},[]);
useEffect(()=>{if(!loaded||!plans)return;try{window.storage.set("forge-v3",JSON.stringify({plans,pid,log,wi,di}));}catch{}},[plans,pid,log,wi,di,loaded]);
const plan=plans?.find(p=>p.id===pid);const week=plan?.weeks?.[wi];const day=week?.days?.[di];
const hLog=useCallback((w,d,e,s,v)=>{const k=`${pid}-${w}-${d}-${e}-${s}`;setLog(prev=>{const n={...prev};v==null?delete n[k]:n[k]={repsHit:v,ts:Date.now()};return n;});},[pid]);
const hSwap=useCallback((w,d,e,alt)=>{setPlans(prev=>prev.map(p=>{if(p.id!==pid)return p;const n=JSON.parse(JSON.stringify(p));n.weeks.forEach(wk=>{if(wk.days[d]?.exercises[e]){const old=wk.days[d].exercises[e];wk.days[d].exercises[e]={...old,name:alt.name,equipment:alt.eq,progressionStep:alt.step||0,isMain:!!alt.step,sets:old.sets.map(s=>({...s,weight:alt.w,reps:alt.r}))};}});return n;}));},[pid]);
const pct=useMemo(()=>{if(!day)return 0;let t=0,dn=0;day.exercises.forEach((ex,ei)=>ex.sets.forEach((_,si)=>{t++;if(log[`${pid}-${wi}-${di}-${ei}-${si}`]?.repsHit!=null)dn++;}));return t?Math.round(dn/t*100):0;},[day,wi,di,log,pid]);
const wpcts=useMemo(()=>{if(!week)return[];return week.days.map((d2,di2)=>{let t=0,dn=0;d2.exercises.forEach((ex,ei)=>ex.sets.forEach((_,si)=>{t++;if(log[`${pid}-${wi}-${di2}-${ei}-${si}`]?.repsHit!=null)dn++;}));return t?Math.round(dn/t*100):0;});},[week,wi,log,pid]);
const pc={intro:{bg:"rgba(99,179,237,0.12)",t:"#63B3ED",b:"rgba(99,179,237,0.2)"},build:{bg:"rgba(72,187,120,0.12)",t:"#48BB78",b:"rgba(72,187,120,0.2)"},peak:{bg:"rgba(236,201,75,0.12)",t:"#ECC94B",b:"rgba(236,201,75,0.2)"},overreach:{bg:"rgba(245,101,101,0.12)",t:"#F56565",b:"rgba(245,101,101,0.2)"},deload:{bg:"rgba(160,174,192,0.12)",t:"#A0AEC0",b:"rgba(160,174,192,0.2)"}};
const css=`@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}`;
return(<div style={{"--ac":"#A78BFA","--ac2":"#7C3AED","--t1":"#F7FAFC","--t2":"#A0AEC0","--t3":"#4A5568","--bg":"#0D1117","--sf":"rgba(255,255,255,0.03)","--bd":"rgba(255,255,255,0.06)",fontFamily:'"SF Pro Display",-apple-system,BlinkMacSystemFont,system-ui,sans-serif',background:"var(--bg)",minHeight:"100vh",maxWidth:480,margin:"0 auto",color:"var(--t1)",WebkitFontSmoothing:"antialiased",paddingBottom:96,paddingTop:"env(safe-area-inset-top)",overscrollBehavior:"none",WebkitTouchCallout:"none",WebkitTapHighlightColor:"transparent",WebkitUserSelect:"none",userSelect:"none",touchAction:"pan-y"}}><style>{css}</style>
{/* Header */}
<div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><div><div style={{fontSize:10,fontWeight:800,letterSpacing:"0.16em",textTransform:"uppercase",color:"var(--ac)",marginBottom:2}}>FORGE</div><div style={{fontSize:20,fontWeight:900,letterSpacing:"-0.03em",background:"linear-gradient(135deg,#F7FAFC 0%,#A78BFA 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{plan?.name||"Workout"}</div></div></div>
{/* WORKOUT TAB */}
{tab==="workout"&&plan&&(<><div style={{padding:"0 20px",position:"sticky",top:0,zIndex:50,background:"rgba(13,17,23,0.88)",backdropFilter:"blur(20px) saturate(180%)"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><button onClick={()=>setWi(Math.max(0,wi-1))} disabled={wi===0} style={{width:36,height:36,borderRadius:12,border:"1px solid var(--bd)",background:"var(--sf)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",opacity:wi===0?0.3:1,color:"var(--t1)"}}><I n="chevL" s={18}/></button><div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,letterSpacing:"-0.02em"}}>Week {wi+1}</div>{week?.phase&&<div style={{display:"inline-flex",marginTop:3,fontSize:10,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",background:pc[week.phase.phase]?.bg,color:pc[week.phase.phase]?.t,border:`1px solid ${pc[week.phase.phase]?.b}`,padding:"3px 10px",borderRadius:8}}>{week.phase.label}</div>}</div><button onClick={()=>setWi(Math.min((plan.weeks?.length||1)-1,wi+1))} disabled={wi>=(plan.weeks?.length||1)-1} style={{width:36,height:36,borderRadius:12,border:"1px solid var(--bd)",background:"var(--sf)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",opacity:wi>=(plan.weeks?.length||1)-1?0.3:1,color:"var(--t1)"}}><I n="chevR" s={18}/></button></div><div style={{display:"flex",gap:4,paddingBottom:12,overflowX:"auto",scrollbarWidth:"none"}}>{week?.days?.map((d2,i)=>{const a=i===di;const p2=wpcts[i]||0;return<button key={i} onClick={()=>setDi(i)} style={{flex:"1 0 auto",minWidth:50,padding:"8px 6px",borderRadius:12,border:a?"2px solid var(--ac)":"1px solid var(--bd)",background:a?"rgba(167,139,250,0.1)":"var(--sf)",cursor:"pointer",textAlign:"center",position:"relative",overflow:"hidden"}}>{p2>0&&<div style={{position:"absolute",bottom:0,left:0,width:`${p2}%`,height:3,background:p2===100?"var(--ac)":"rgba(255,255,255,0.1)",borderRadius:2,transition:"widt {day&&(<div style={{padding:"0 16px",animation:"fadeIn .3s ease"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,padding:"0 4px"}}><div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{day.subtitle||`${day.exercises.length} exercises`}</div><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:72,height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:"var(--ac)",borderRadius:3,transition:"width .4s cubic-bezier(.16,1,.3,1)"}}/></div><span style={{fontSize:12,fontWeight:800,color:pct===100?"var(--ac)":"var(--t3)",fontVariantNumeric:"tabular-nums"}}>{pct}%</span></div></div>
{day.exercises.map((ex,ei)=>(<ExBlock key={`${wi}-${di}-${ei}-${ex.name}`} ex={ex} ei={ei} di={di} wi={wi} log={Object.fromEntries(Object.entries(log).filter(([k])=>k.startsWith(`${pid}-`)).map(([k,v])=>[k.replace(`${pid}-`,""),v]))} onLog={hLog} onRest={()=>{setTsec(ex.isMain?180:120);setTimer(true);}} onSwap={hSwap}/>))}
{pct>0&&<button onClick={()=>{const n={...log};day.exercises.forEach((ex,ei)=>ex.sets.forEach((_,si)=>{delete n[`${pid}-${wi}-${di}-${ei}-${si}`];}));setLog(n);}} style={{width:"100%",padding:"12px",marginTop:8,borderRadius:14,border:"1px solid rgba(245,101,101,0.2)",background:"rgba(245,101,101,0.06)",color:"#F56565",fontSize:13,fontWeight:700,cursor:"pointer"}}>Reset Today</button>}<div style={{height:32}}/></div>)}</>)}
{/* PROGRAM TAB */}
{tab==="program"&&(<div style={{padding:"0 16px",animation:"fadeIn .3s ease"}}><div style={{fontSize:20,fontWeight:900,letterSpacing:"-0.03em",marginBottom:4,padding:"0 4px"}}>Programs</div><div style={{fontSize:13,color:"var(--t2)",marginBottom:16,padding:"0 4px"}}>Your training plans</div>{plans?.map(p=>(<button key={p.id} onClick={()=>{setPid(p.id);setWi(0);setDi(0);setTab("workout");}} style={{width:"100%",padding:"16px 18px",marginBottom:10,borderRadius:18,border:p.id===pid?"2px solid var(--ac)":"1px solid var(--bd)",background:p.id===pid?"rgba(167,139,250,0.08)":"var(--sf)",cursor:"pointer",textAlign:"left",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:p.id===pid?"inset 2px 2px 6px rgba(167,139,250,0.1),inset -2px -2px 6px rgba(0,0,0,0.2)":"2px 2px 8px rgba(0,0,0,0.3),-1px -1px 4px rgba(255,255,255,0.02)"}}><div><div style={{fontSize:16,fontWeight:800,color:"var(--t1)"}}>{p.name}</div><div style={{fontSize:12,color:"var(--t2)",marginTop:2}}>{p.subtitle||`${p.daysPerWeek} days/week`}</div></div>{p.id===pid&&<span style={{fontSize:10,fontWeight:800,background:"var(--ac)",color:"#fff",padding:"3px 10px",borderRadius:8}}>ACTIVE</span>}</button>))}<button onClick={()=>setShowWiz(true)} style={{width:"100%",padding:"16px",borderRadius:18,border:"2px dashed rgba(167,139,250,0.3)",background:"transparent",cursor:"pointer",fontSize:14,fontWeight:700,color:"var(--ac)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:4}}><I n="plus" s={18} c="var(--ac)"/>Create New Plan</button>{plan&&(<div style={{marginTop:24}}><div style={{fontSize:16,fontWeight:800,marginBottom:12,padding:"0 4px"}}>{plan.name} — Weeks</div>{plan.weeks?.map((wk,wki)=>{const ts=wk.days.reduce((a,d)=>a+d.exercises.reduce((b,e)=>b+e.sets.length,0),0);const ds=wk.days.reduce((a,d,dii)=>a+d.exercises.reduce((b,e,eii)=>b+e.sets.filter((_,sii)=>log[`${plan.id}-${wki}-${dii}-${eii}-${sii}`]?.repsHit!=null).length,0),0);const p2=ts?Math.round(ds/ts*100):0;return<button key={wki} onClick={()=>{setWi(wki);setTab("workout");}} style={{width:"100%",padding:"14px 16px",marginBottom:8,borderRadius:14,border:wki===wi?`2px solid ${pc[wk.phase?.phase]?.t||"var(--ac)"}`:"1px solid var(--bd)",background:"var(--sf)",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"2px 2px 8px rgba(0,0,0,0.2),-1px -1px 4px rgba(255,255,255,0.01)"}}><div><div style={{fontSize:15,fontWeight:800}}>Week {wki+1}</div><div style={{fontSize:12,color:pc[wk.phase?.phase]?.t||"var(--t2)",fontWeight:700,marginTop:2}}>{wk.phase?.label||""}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:900,fontVariantNumeric:"tabular-nums",color:p2===100?"var(--ac)":"var(--t1)"}}>{p2}%</div><div style={{fontSize:11,color:"var(--t3)"}}>{ds}/{ts}</div></div></button>;})}</div>)}</div>)}
{/* PROGRESS TAB */}
{tab==="progress"&&(<div style={{padding:"0 16px",animation:"fadeIn .3s ease"}}><div style={{fontSize:20,fontWeight:900,letterSpacing:"-0.03em",marginBottom:16,padding:"0 4px"}}>Progress</div><div style={{background:"var(--sf)",borderRadius:18,border:"1px solid var(--bd)",padding:"16px",boxShadow:"2px 2px 8px rgba(0,0,0,0.2),-1px -1px 4px rgba(255,255,255,0.01)"}}><div style={{fontSize:14,fontWeight:800,marginBottom:12}}>Workout Completion</div>{plan?.weeks?.map((wk,wki)=>{const ts=wk.days.reduce((a,d)=>a+d.exercises.reduce((b,e)=>b+e.sets.length,0),0);const ds=wk.days.reduce((a,d,dii)=>a+d.exercises.reduce((b,e,eii)=>b+e.sets.filter((_,sii)=>log[`${plan.id}-${wki}-${dii}-${eii}-${sii}`]?.repsHit!=null).length,0),0);const p2=ts?Math.round(ds/ts*100):0;return<div key={wki} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{width:36,fontSize:11,fontWeight:700,color:"var(--t3)"}}>W{wki+1}</span><div style={{flex:1,height:8,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden"}}><div style={{width:`${p2}%`,height:"100%",borderRadius:4,transition:"width .4s ease",background:p2===100?"var(--ac)":"linear-gradient(90deg,#7C3AED,#A78BFA)"}}/></div><span style={{width:32,fontSize:11,fontWeight:800,textAlign:"right",fontVariantNumeric:"tabular-nums",color:p2===100?"var(--ac)":"var(--t2)"}}>{p2}%</span></div>;})}</div></div>)}
{/* Wizard overlay placeholder */}
{showWiz&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .2s ease"}}><div style={{width:"100%",maxWidth:480,background:"#161B22",borderRadius:"24px 24px 0 0",padding:28,paddingBottom:"max(28px, env(safe-area-inset-bottom))",boxShadow:"0 -8px 40px rgba(0,0,0,0.5)"}}><div style={{fontSize:20,fontWeight:900,marginBottom:4}}>New Full-Body Plan</div><div style={{fontSize:13,color:"var(--t2)",marginBottom:20}}>Custom plan generator with day selection, gender-specific volume, and MRV-aware periodization — coming in next iteration.</div><button onClick={()=>setShowWiz(false)} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:"var(--ac)",cursor:"pointer",fontSize:15,fontWeight:800,color:"#fff"}}>Close</button></div></div>)}
{timer&&<RestTimer sec={tsec} onDone={()=>setTimer(false)}/>}
{/* FLOATING TAB BAR */}
<div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 40px)",maxWidth:440,padding:"6px",borderRadius:22,background:"rgba(22,27,34,0.85)",backdropFilter:"blur(24px) saturate(180%)",border:"1px solid rgba(255,255,255,0.06)",boxShadow:"0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-around",gap:4,zIndex:90,paddingBottom:"max(6px, env(safe-area-inset-bottom))"}}>{[{id:"workout",icon:"dumb",label:"Workout"},{id:"program",icon:"cal",label:"Program"},{id:"progress",icon:"chart",label:"Progress"}].map(t2=>(<button key={t2.id} onClick={()=>setTab(t2.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 8px",borderRadius:18,border:"none",background:tab===t2.id?"rgba(167,139,250,0.15)":"transparent",color:tab===t2.id?"var(--ac)":"var(--t3)",cursor:"pointer",transition:"all .25s cubic-bezier(.16,1,.3,1)",...(tab===t2.id?{boxShadow:"inset 2px 2px 6px rgba(0,0,0,0.3),inset -2px -2px 6px rgba(167,139,250,0.08)"}:{})}}><I n={t2.icon} s={20} c={tab===t2.id?"var(--ac)":"var(--t3)"}/><span style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em"}}>{t2.label}</span></button>))}</div></div>);}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ForgeApp));
  </script>
